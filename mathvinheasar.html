<body class="py-8">

    <!-- ក្រដាសវិញ្ញាសា -->
    <div class="a4-paper text-sm text-gray-900 leading-relaxed" id="exam-content">
        <!-- ខ្លឹមសារនឹងត្រូវបានបញ្ចូលទីនេះដោយ JavaScript -->
    </div>

    <script>
        // អនុគមន៍សម្រាប់ទាញយកលេខចៃដន្យ (Random Number)
        function getRandomInt(min, max) {
            return Math.floor(Math.random() * (max - min + 1)) + min;
        }

        // អថេរសកល (Global Variables) សម្រាប់ផ្ទុកទិន្នន័យបច្ចុប្បន្ន ដើម្បីពេលទាញយកបានទិន្នន័យដូចគ្នា
        let currentYear, currentLimitNum1, currentK;

        // អនុគមន៍សម្រាប់បង្កើតវិញ្ញាសា
        function generateExam() {
            // បង្កើតអថេរអូតូ (Auto Variables)
            currentYear = getRandomInt(2023, 2026);
            currentLimitNum1 = getRandomInt(2, 5);
            currentK = [9, 16, 25][getRandomInt(0, 2)];
            
            // ខ្លឹមសារវិញ្ញាសាសម្រាប់បង្ហាញលើ Website
            const htmlContent = `
                <div class="text-center mb-6">
                    <h2 class="text-xl font-bold">វិញ្ញាសាទី១ ត្រៀមប្រឡងប្រឡងបាក់ឌុបមធ្យមសិក្សាទុតិយភូមិ</h2>
                </div>

                <div class="space-y-4">
                    <div>
                        <span class="font-bold">I.</span> គេមានចំនួនកុំផ្លិច \\( a_m = (1 - m) + (3 - m)i\\sqrt{3} \\) ។<br>
                        កំណត់ \\( a_2 \\) និង \\( a_4 \\) ដោយឱ្យលទ្ធផលជាទម្រង់ពីជគណិត និងត្រីកោណមាត្រ។ គណនា \\( (a_2)^{${currentYear}} \\) និង \\( (a_4)^{${currentYear}} \\)។<br>
                        យក \\( b = i\\frac{\\sqrt{3}}{3}a_4 \\) ចូរកំណត់ \\( b \\) ជាទម្រង់ត្រីកោណមាត្រ។ បង្កើតសមីការដឺក្រេទី២ ដែលមានឫស \\( a_2 \\) និង \\( b \\)។
                    </div>

                    <div>
                        <span class="font-bold">II.</span> គណនាលីមីត និងអាំងតេក្រាលនៃអនុគមន៍ដូចខាងក្រោម៖
                        <div class="math-block">
                            \\( \\lim_{x\\to0} \\frac{\\sin 3x - ${currentLimitNum1} \\tan 3x + x^2}{x + 5 \\tan 2x} \\) &nbsp;&nbsp;&nbsp;&nbsp;
                            \\( \\lim_{x\\to2} \\frac{x^3 - 3x^2 + 4x - 4}{\\sqrt{x + 2} - 2} \\) &nbsp;&nbsp;&nbsp;&nbsp;
                            \\( \\lim_{x\\to0} \\frac{\\ln(1 - 2\\sin^2 2x) + 3\\tan^2 3x}{x^2} \\)
                        </div>
                        គេឱ្យអនុគមន៍ \\( f(x) = \\frac{3\\cos x - \\sin x}{\\sin x + \\cos x} \\) ដែល \\( x \\neq -\\frac{\\pi}{4} \\)។ គណនាអាំងតេក្រាល \\( I = \\int_{0}^{\\frac{\\pi}{2}} f(x)dx \\) ដោយដឹងថា \\( f(x) \\) អាចសរសេរជាទម្រង់ \\( f(x) = m + \\frac{n(\\sin x - \\cos x)}{\\sin x + \\cos x} \\)។
                    </div>

                    <div>
                        <span class="font-bold">III.</span> គេឱ្យប៉ារ៉ាបូល \\( P \\) ដែលមានសមីការ \\( y^2 - 4y - 4mx + 4 - 4m(m + 1) = 0 \\)។<br>
                        <div class="ml-4">
                            a. ស្រាយបំភ្លឺថា \\( P \\) មានកុំប៉ូលជាចំណុចមួយដែលត្រូវកំណត់ដោយ \\( m \\)។<br>
                            b. បើ \\( m = 1 \\) ចូររកផលបូកបម្រែបម្រួល និងសមីការប៉ារ៉ាបូល \\( P \\)។
                        </div>
                        គេឱ្យប្លង់ពីរ \\( P: 2x - y + 2z - 4 = 0 \\) និង \\( Q: x + y - \\frac{1}{2}z - 2 = 0 \\)។<br>
                        <div class="ml-4">
                            a. ស្រាយបញ្ជាក់ថា \\( P \\) និង \\( Q \\) កែងគ្នា។ បង្ហាញថា \\( A(1, 2, 2) \\) ជាចំណុចរួមនៃ \\( P \\) និង \\( Q \\)។<br>
                            b. សរសេរសមីការបន្ទាត់ \\( L \\) ជាប្រសព្វនៃប្លង់ទាំងពីរ។ បង្ហាញថា \\( L \\) ស្របនឹង \\( \\vec{n}_P \\times \\vec{n}_Q \\) ដែល \\( \\vec{n}_P \\) និង \\( \\vec{n}_Q \\) ជាវ៉ិចទ័រន័រម៉ាល់នៃ \\( P \\) និង \\( Q \\) រៀងគ្នា។
                        </div>
                    </div>

                    <div>
                        <span class="font-bold">IV.</span> \\( f \\) ជាអនុគមន៍កំណត់ដោយ \\( f(x) = x + \\frac{${currentK}}{4(e^x - 1)} \\) មានក្រាបតំណាង \\( C \\)។<br>
                        <div class="ml-4">
                            ១. រកដែនកំណត់នៃ \\( f \\) គណនាលីមីតនៃ \\( f \\) ត្រង់ \\( +\\infty, -\\infty \\) និង \\( 0 \\)។ ទាញរកសមីការអាស៊ីមតូត នៃក្រាប \\( C \\)។<br>
                            ២. ស្រាយបញ្ជាក់ថា \\( D_1: y = x \\) ជាអាស៊ីមតូត ត្រេតនៃក្រាប \\( C \\)។ បញ្ជាក់ទីតាំងធៀបរវាងក្រាប \\( C \\) និង \\( D_1 \\)។<br>
                            ៣. ស្រាយបំភ្លឺថា \\( f(x) = x - \\frac{${currentK}}{4} + \\frac{${currentK}e^x}{4(e^x - 1)} \\)។ ទាញរកសមីការអាស៊ីមតូត ត្រេត \\( D_2 \\) នៃក្រាប \\( C \\)។<br>
                            ៤. ស្រាយបំភ្លឺថា \\( \\forall x \\neq 0, f'(x) = \\frac{(e^x - 4)(4e^x - 1)}{4(e^x - 1)^2} \\)។ សិក្សាទិសដៅ និងសង់តារាងអថេរភាពនៃ \\( f \\)។<br>
                            ៥. សរសេរសមីការបន្ទាត់ \\( T \\) ប៉ះនឹងក្រាប \\( C \\) ត្រង់ចំណុច \\( x = \\ln 2 \\)។ សង់ក្រាប \\( C \\)។<br>
                            ៦. គណនាផ្ទៃក្រឡានៃផ្នែកដែលខណ្ឌដោយក្រាប \\( C \\) និងបន្ទាត់ \\( D_2 \\) ត្រង់ចំណុច \\( x = \\ln 4 \\) និង \\( x = \\ln 6 \\)។
                        </div>
                    </div>

                    <div>
                        <span class="font-bold">V.</span> កាបូបមួយប្រភេទ មានរូបដែលជាប្រភេទ ៥ មុខ សម្បុរ ៤ មុខ និង ហាង ៤ មុខ។ បុរសម្នាក់បានទៅទិញរូបចំនួន ៣ មុខ ដោយចៃដន្យ។ គណនាប្រូបាប៊ីលីតេនៃព្រឹត្តិការណ៍៖<br>
                        <div class="ml-4">
                            \\( A \\)៖ កម្បូដបាន ៣ មុខដូចគ្នា។<br>
                            \\( B \\)៖ កម្បូដបាន សម្បុរ តែ ១ មុខគត់។<br>
                            \\( C \\)៖ កម្បូដបាន ៣ មុខផ្សេងៗគ្នា។
                        </div>
                    </div>

                    <div>
                        <span class="font-bold">VI.</span> គេឱ្យសមីការឌីផេរ៉ង់ស្យែល \\( E: (y' - 2y)' = 3(y' - 2y) \\) និង \\( (E'): f' - 3f = 0 \\)។<br>
                        <div class="ml-4">
                            ១. ដោះស្រាយសមីការ \\( (E') \\) ដោយដឹងថា ក្រាបនៃ \\( f \\) កាត់ \\( A(0,3) \\) រួចទាញរកចម្លើយទូទៅនៃសមីការ \\( E \\) តាម \\( f \\)។<br>
                            ២. ដោះស្រាយសមីការ \\( (E) \\) តាមរបៀបទី ២ រួចរកចម្លើយពិសេសនៃ \\( (E) \\) ដោយដឹងថា ក្រាប \\( C \\) ប៉ះនឹងបន្ទាត់ \\( y = x - 4 \\) ត្រង់ចំណុចដែលមានអាប់ស៊ីស ០។
                        </div>
                    </div>
                </div>

                <div class="footer">
                    បង្រៀនដោយ លោកគ្រូ ឆយ សុវ៉ាន់ណេត Tel: 016 567 437
                </div>
            `;

            // បញ្ចូលកូដទៅក្នុង HTML
            document.getElementById('exam-content').innerHTML = htmlContent;

            // ប្រាប់ MathJax ឲ្យ Render រូបមន្ត LaTeX ឡើងវិញ
            if (window.MathJax) {
                MathJax.typesetPromise([document.getElementById('exam-content')]).catch(function (err) {
                    console.error('MathJax rendering error:', err.message);
                });
            }
        }

        // អនុគមន៍សម្រាប់រៀបចំអត្ថបទ (Markdown/LaTeX) សម្រាប់ទាញយក
        function getExamMarkdown() {
            return `
# វិញ្ញាសាទី១ ត្រៀមប្រឡងប្រឡងបាក់ឌុបមធ្យមសិក្សាទុតិយភូមិ

**I.** គេមានចំនួនកុំផ្លិច $a_m = (1 - m) + (3 - m)i\\sqrt{3}$ ។
កំណត់ $a_2$ និង $a_4$ ដោយឱ្យលទ្ធផលជាទម្រង់ពីជគណិត និងត្រីកោណមាត្រ។ គណនា $(a_2)^{${currentYear}}$ និង $(a_4)^{${currentYear}}$។

        function downloadWord() {
            // បំប្លែង Markdown ទៅជា HTML ធម្មតា ដើម្បីឲ្យ Word អាចអានបាន

            const html = `
            <html xmlns:o='urn:schemas-microsoft-com:office:office' xmlns:w='urn:schemas-microsoft-com:office:word' xmlns='http://www.w3.org/TR/REC-html40'>

            // បង្កើតឯកសារនិងទាញយក
            const blob = new Blob(['\ufeff', html], { type: 'application/msword' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = 'exam_mathtype.doc';
            document.body.appendChild(a);
            a.click();
            document.body.removeChild(a);
            URL.revokeObjectURL(url);
