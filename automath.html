    <!-- ក្រដាសវិញ្ញាសា -->

        <!-- ខ្លឹមសារនឹងត្រូវបានបញ្ចូលទីនេះដោយ JavaScript -->
    </div>

    <script>
        // អថេរសកល (Global Variables) សម្រាប់ផ្ទុកទិន្នន័យបច្ចុប្បន្ន ដើម្បីពេលទាញយកបានទិន្នន័យដូចគ្នា
        let currentYear, currentLimitNum1, currentK;
        let currentMarkdownContext = ""; // ផ្ទុកទិន្នន័យវិញ្ញាសាជាអត្ថបទ Markdown
        
        // -------------------------------------------------------------
        // ផ្នែកហៅទៅកាន់ AI (Gemini API) ដែលបានពង្រឹងលក្ខខណ្ឌថ្មី
        // -------------------------------------------------------------
        const apiKey = ""; // API Key នឹងត្រូវបញ្ជូលស្វ័យប្រវត្តិដោយប្រព័ន្ធ

        // អនុគមន៍សម្រាប់ហៅ API ដោយមានការសាកល្បងច្រើនដងបើបរាជ័យ (Exponential Backoff)
        async function fetchWithRetry(url, options, maxRetries = 5) {
            let retries = 0;
            const delays = [1000, 2000, 4000, 8000, 16000];
            while (retries < maxRetries) {
                try {
                    const response = await fetch(url, options);
                    if (!response.ok) {
                        throw new Error(`HTTP error! status: ${response.status}`);
                    }
                    return await response.json();
                } catch (error) {
                    if (retries >= maxRetries - 1) {
                        throw error;
                    }
                    await new Promise(resolve => setTimeout(resolve, delays[retries]));
                    retries++;
                }
            }
        }

        // អនុគមន៍បញ្ជាឲ្យ AI បង្កើតវិញ្ញាសា
        async function generateExamWithAI() {
            const btn = document.getElementById('btn-ai');
            const btnText = document.getElementById('btn-ai-text');
            const originalText = btnText.innerText;
            const classLevel = document.getElementById('class-level').value; 
            
            // បិទប៊ូតុងសិនពេលកំពុងដំណើរការ
            btn.disabled = true;
            btnText.innerText = "កំពុងតាក់តែង...";
            btn.classList.add('opacity-75', 'cursor-not-allowed', 'animate-pulse');
            
            // បង្ហាញ Loading ថ្មីស្អាតជាងមុន
            document.getElementById('exam-content').innerHTML = `
                <div class="flex flex-col items-center justify-center h-full min-h-[500px]">
                    <div class="relative w-24 h-24 mb-6">
                        <div class="absolute inset-0 rounded-full border-t-4 border-b-4 border-purple-600 animate-spin"></div>
                        <div class="absolute inset-2 rounded-full border-l-4 border-r-4 border-blue-400 animate-spin" style="animation-direction: reverse;"></div>
                        <div class="absolute inset-0 flex items-center justify-center font-bold text-xl text-purple-700">AI</div>
                    </div>
                    <div class="text-xl text-transparent bg-clip-text bg-gradient-to-r from-purple-700 to-blue-700 font-extrabold mb-2 text-center">
                        AI កំពុងតាក់តែងវិញ្ញាសា${classLevel === 'science' ? 'វិទ្យាសាស្រ្តពិត' : 'វិទ្យាសាស្រ្តសង្គម'}ថ្មី...
                    </div>
                    <div class="text-sm text-gray-500 font-medium bg-gray-100 px-4 py-2 rounded-full mt-2">
                        សូមរង់ចាំប្រមាណ ៥ ទៅ ១០ វិនាទី 🚀
                    </div>
                </div>
            `;

            // រៀបចំលក្ខខណ្ឌទៅតាមកម្រិតថ្នាក់ (តឹងរ៉ឹងបំផុត)
            let prompt = "";

            if (classLevel === "science") {
                prompt = `អ្នកគឺជាសាស្ត្រាចារ្យគណិតវិទ្យាដ៏ពូកែម្នាក់។ សូមបង្កើតវិញ្ញាសាគណិតវិទ្យាថ្នាក់ទី១២ (វិទ្យាសាស្រ្តពិត) ត្រៀមប្រឡងបាក់ឌុបនៅកម្ពុជាថ្មីមួយ។
លក្ខខណ្ឌតឹងរ៉ឹង (Must Follow):
១. វិញ្ញាសាត្រូវមាន ៥ រ៉ូម៉ាំង ដែលមានកម្រិតលំបាកខ្ពស់ និងគ្របដណ្ដប់លើមេរៀនសំខាន់ៗដូចខាងក្រោម៖
   - I. ចំនួនកុំផ្លិច៖ ការគណនា ទម្រង់ត្រីកោណមាត្រ ទម្រង់អ៊ិចស្ប៉ូណង់ស្យែល ឬការរកឫសទី n។
   - II. លីមីត (៣លំហាត់) និង អាំងតេក្រាល (៣លំហាត់)៖ ការគណនាលីមីតរាងមិនកំណត់ និងអាំងតេក្រាលកំណត់ (មានទាមទាររកផ្ទៃក្រឡា ឬ មាឌសូលីតបរិវត្ត)។
   - III. សមីការឌីផេរ៉ង់ស្យែល (២សំនួរ គឺលំដាប់ទី១ ឬទី២) និង ប្រូបាប (៣សំនួរ ពីប្រូបាបព្រឹត្តិការណ៍ ច្បាប់ប៊ែរនូយី ឬអថេរចៃដន្យ)។
   - IV. ធរណីមាត្រក្នុងលំហ ឬ កោនិក (៣សំនួរ)៖ សមីការប្លង់ បន្ទាត់ ចម្ងាយ ផលគុណស្កាលែ ផលគុណវ៉ិចទ័រ ឬលំហាត់ប៉ារ៉ាបូល អេលីប អ៊ីពែបូល។

        // -------------------------------------------------------------
        // ផ្នែកបំលែង Markdown ទៅបង្ហាញលើ DOM
        // -------------------------------------------------------------
        function renderMarkdownToDOM(markdownText) {
            let text = markdownText;
            
            // បំបែកយកជើងទំព័រ (Footer) បើមាន
            let mainContent = text;
            let footerText = "";
            const footerSplit = text.split(/---\n?/);
            if (footerSplit.length > 1) {
                mainContent = footerSplit[0].trim();
                footerText = footerSplit[1].trim();
            } else {
                // បើគ្មាន --- ទេ យើងរកពាក្យ បង្រៀនដោយ
                const fallbackSplit = text.split(/(បង្រៀនដោយ.*)/);
                if(fallbackSplit.length > 1) {
                    mainContent = fallbackSplit[0].trim();
                    footerText = fallbackSplit[1].trim();
                }
            }

            // រចនាបទថ្មី ឲ្យវិញ្ញាសាមើលទៅស្អាត និងមានសណ្តាប់ធ្នាប់
            // ១. បម្លែងចំណងជើងធំ ដាក់កណ្តាល និងមានបន្ទាត់ពីក្រោម
            mainContent = mainContent.replace(/^#\s+(.*$)/gim, '<div class="exam-title"><h2>$1</h2><p class="text-sm text-gray-500 mt-1 font-bold">រយៈពេល៖ ១៥០ នាទី</p></div>');
            
            // ២. បម្លែងលេខរ៉ូម៉ាំង (I., II., III....) ឱ្យលេចធ្លោ មានពណ៌ និងបន្ទាត់
            mainContent = mainContent.replace(/\*\*(I|II|III|IV|V|VI|VII)\.\*\*/gim, '<div class="exam-roman">$1.</div>');
            mainContent = mainContent.replace(/^(I|II|III|IV|V|VI|VII)\./gim, '<div class="exam-roman">$1.</div>');
            
            // ៣. បម្លែងអក្សរដិតធម្មតា
            mainContent = mainContent.replace(/\*\*(.*?)\*\*/gim, '<span class="font-bold text-gray-900">$1</span>');
            
            // ៤. រៀបចំការចុះបន្ទាត់ និងបន្ថែមគម្លាត
            mainContent = mainContent.replace(/\n\n/g, '</p><p class="mt-3">').replace(/\n/g, '<br>');
            
            // ផ្គុំចូលគ្នាវិញ ដោយបន្ថែមថ្នាក់ CSS សម្រាប់អក្សរ
            let html = `<div class="exam-text"><p>${mainContent}</p></div>`;
            
            if (footerText) {
                html += `<div class="footer">${footerText.replace(/\n/g, '<br>')}</div>`;
            } else {
                // បើសិន AI ភ្លេចដាក់ជើងទំព័រ
                html += `<div class="footer">បង្រៀនដោយ លោកគ្រូ ឆយ សុវ៉ាន់ណេត Tel: 016 567 437</div>`;
            }

            document.getElementById('exam-content').innerHTML = html;

            // ប្រាប់ MathJax ឲ្យ Render រូបមន្ត LaTeX ឡើងវិញ
            if (window.MathJax) {
                MathJax.typesetPromise([document.getElementById('exam-content')]).catch(function (err) {
                    console.error('MathJax rendering error:', err.message);
                });
            }
        }

        // -------------------------------------------------------------
        // ផ្នែកគំរូចាស់ (Local Randomizer)

៦. គណនាផ្ទៃក្រឡានៃផ្នែកដែលខណ្ឌដោយក្រាប $C$ និងបន្ទាត់ $D_2$ ត្រង់ចំណុច $x = \\ln 4$ និង $x = \\ln 6$។

**V.** កាបូបមួយប្រភេទ មានរូបដែលជាប្រភេទ ៥ មុខ សម្បុរ ៤ មុខ និង ហាង ៤ មុខ។ បុរសម្នាក់បានទៅទិញរូបចំនួន ៣ មុខ ដោយចៃដន្យ។ គណនាប្រូបាប៊ីលីតេនៃព្រឹត្តិការណ៍៖
$A$៖ កម្បូដបាន ៣ មុខដូចគ្នា។
$B$៖ កម្បូដបាន សម្បុរ តែ ១ មុខគត់។
$C$៖ កម្បូដបាន ៣ មុខផ្សេងៗគ្នា។

**VI.** គេឱ្យសមីការឌីផេរ៉ង់ស្យែល $E: (y' - 2y)' = 3(y' - 2y)$ និង $(E'): f' - 3f = 0$។
១. ដោះស្រាយសមីការ $(E')$ ដោយដឹងថា ក្រាបនៃ $f$ កាត់ $A(0,3)$ រួចទាញរកចម្លើយទូទៅនៃសមីការ $E$ តាម $f$។
២. ដោះស្រាយសមីការ $(E)$ តាមរបៀបទី ២ រួចរកចម្លើយពិសេសនៃ $(E)$ ដោយដឹងថា ក្រាប $C$ ប៉ះនឹងបន្ទាត់ $y = x - 4$ ត្រង់ចំណុចដែលមានអាប់ស៊ីស ០។

        function downloadWord() {
            if (!currentMarkdownContext) {
                alert("សូមបង្កើតវិញ្ញាសាសិន!");
                return;
            }
            
            // រៀបចំអត្ថបទសម្រាប់ Word
            let content = currentMarkdownContext
                .replace(/^#\s+(.*$)/gim, '<h2 align="center" style="color:#1d4ed8;">$1</h2>')
                .replace(/\n\n/g, '<br><br>')
                .replace(/\n/g, '<br>')
                .replace(/\*\*(.*?)\*\*/g, '<b>$1</b>');
                
            const html = `
            <html xmlns:o='urn:schemas-microsoft-com:office:office' xmlns:w='urn:schemas-microsoft-com:office:word' xmlns='http://www.w3.org/TR/REC-html40'>
            <head>
                <meta charset='utf-8'>
                <title>Exam</title>
            </head>
            <body style="font-family: 'Khmer OS Siemreap', 'Suwannaphum', sans-serif;">
                <div style="font-size: 12pt; line-height: 1.5;">
                    ${content}
                </div>
            </body>
            </html>
            `;

            const blob = new Blob(['\ufeff', html], { type: 'application/msword' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = 'exam_mathtype.doc';
            document.body.appendChild(a);
            a.click();
            document.body.removeChild(a);
            URL.revokeObjectURL(url);
        }

            }
            const blob = new Blob([currentMarkdownContext], { type: 'text/markdown;charset=utf-8' });

            a.download = 'exam_obsidian_latex.md';

            a.click();
            document.body.removeChild(a);
            URL.revokeObjectURL(url);
